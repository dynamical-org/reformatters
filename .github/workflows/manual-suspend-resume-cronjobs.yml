name: 'Manual: Suspend/Resume Dataset CronJobs'
'on':
  workflow_dispatch:
    inputs:
      dataset_id:
        description: Dataset whose update/validate cronjobs to suspend or resume
        required: true
        type: choice
        options:
        - dwd-icon-eu-forecast-5-day
        - ecmwf-aifs-ens-forecast
        - ecmwf-aifs-single-forecast
        - ecmwf-ifs-ens-forecast-15-day-0-25-degree
        - nasa-smap-level3-36km-v9
        - noaa-gefs-analysis
        - noaa-gefs-forecast-10-day-spatial-dev
        - noaa-gefs-forecast-35-day
        - noaa-gfs-analysis
        - noaa-gfs-forecast
        - noaa-hrrr-analysis
        - noaa-hrrr-forecast-48-hour
        - noaa-hrrr-forecast-48-hour-virtual
        - noaa-mrms-conus-analysis-hourly
        - noaa-ndvi-cdr-analysis
        - u-arizona-swann-analysis
      action:
        description: suspend or resume
        required: true
        type: choice
        options:
        - suspend
        - resume
concurrency:
  group: k8s-manual-${{ github.actor }}-${{ github.run_id }}
  cancel-in-progress: false
permissions:
  id-token: write
  contents: read
jobs:
  suspend-resume:
    name: Suspend/Resume CronJobs
    runs-on: ubuntu-24.04
    environment: prod
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        sparse-checkout: .
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Install kubectl
      uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b
      with:
        version: latest
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}
    - name: Patch cronjobs (SEE LOGS)
      run: |
        #!/bin/bash
        set -euo pipefail

        DATASET_ID="${{ github.event.inputs.dataset_id }}"
        ACTION="${{ github.event.inputs.action }}"

        if [ "${ACTION}" = "suspend" ]; then
          SUSPEND=true
        else
          SUSPEND=false
        fi

        case "${DATASET_ID}" in
          dwd-icon-eu-forecast-5-day) CRONJOBS="dwd-icon-eu-forecast-5-day-update dwd-icon-eu-forecast-5-day-validate" ;;
          ecmwf-aifs-ens-forecast) CRONJOBS="ecmwf-aifs-ens-forecast-update ecmwf-aifs-ens-forecast-validate" ;;
          ecmwf-aifs-single-forecast) CRONJOBS="ecmwf-aifs-single-forecast-update ecmwf-aifs-single-forecast-validate" ;;
          ecmwf-ifs-ens-forecast-15-day-0-25-degree) CRONJOBS="ecmwf-ifs-ens-forecast-15-day-0-25-degree-update ecmwf-ifs-ens-forecast-15-day-0-25-degree-validate" ;;
          nasa-smap-level3-36km-v9) CRONJOBS="nasa-smap-level3-36km-v9-update nasa-smap-level3-36km-v9-validate" ;;
          noaa-gefs-analysis) CRONJOBS="noaa-gefs-analysis-update noaa-gefs-analysis-validate" ;;
          noaa-gefs-forecast-10-day-spatial-dev) CRONJOBS="noaa-gefs-forecast-10-day-spatial-dev-update noaa-gefs-forecast-10-day-spatial-dev-validate" ;;
          noaa-gefs-forecast-35-day) CRONJOBS="noaa-gefs-forecast-35-day-update noaa-gefs-forecast-35-day-validate" ;;
          noaa-gfs-analysis) CRONJOBS="noaa-gfs-analysis-update noaa-gfs-analysis-validate" ;;
          noaa-gfs-forecast) CRONJOBS="noaa-gfs-forecast-update noaa-gfs-forecast-validate" ;;
          noaa-hrrr-analysis) CRONJOBS="noaa-hrrr-analysis-update noaa-hrrr-analysis-validate" ;;
          noaa-hrrr-forecast-48-hour) CRONJOBS="noaa-hrrr-forecast-48-hour-update noaa-hrrr-forecast-48-hour-validate" ;;
          noaa-hrrr-forecast-48-hour-virtual) CRONJOBS="noaa-hrrr-forecast-48-hour-virtual-update noaa-hrrr-forecast-48-hour-virtual-validate" ;;
          noaa-mrms-conus-analysis-hourly) CRONJOBS="noaa-mrms-conus-analysis-hourly-update noaa-mrms-conus-analysis-hourly-validate" ;;
          noaa-ndvi-cdr-analysis) CRONJOBS="noaa-ndvi-cdr-analysis-update noaa-ndvi-cdr-analysis-validate" ;;
          u-arizona-swann-analysis) CRONJOBS="u-arizona-swann-analysis-update u-arizona-swann-analysis-validate" ;;
          *) echo "Unknown dataset ${DATASET_ID}"; exit 1 ;;
        esac

        for CRONJOB in ${CRONJOBS}; do
          echo "Setting suspend=${SUSPEND} on ${CRONJOB}"
          kubectl patch cronjob "${CRONJOB}" -p "{\"spec\":{\"suspend\":${SUSPEND}}}"
        done

        kubectl get cronjobs
