name: Deploy Operational Updates

# Gate the production deploy on Code Quality passing on main.
on:
  workflow_run:
    workflows: ["Code Quality"]
    types: [completed]
    branches: [main]

# Prevent concurrent runs since this is deploying to the K8S cluster
concurrency:
  group: "deploy"
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  # workflow_run's github.sha is the default-branch tip, so pin to the exact commit
  # that passed Code Quality.
  IMAGE_TAG: "${{ secrets.DOCKER_REPOSITORY }}:${{ github.event.workflow_run.head_sha }}"

jobs:
  deploy:
    name: Deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    environment: prod

    # Keep deploy-staging.yaml and these steps in sync
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --all-extras --dev --locked

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5
        with:
          version: 'latest'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Set up Depot CLI
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2
        id: login-ecr

      - uses: depot/build-push-action@5f3b3c2e5a00f0093de47f657aeaefcedff27d18 # v1
        with:
          project: ${{ secrets.DEPOT_PROJECT }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_TAG }}
          context: .
          file: deploy/Dockerfile

      - name: Deploy
        run: uv run main deploy --docker-image ${{ env.IMAGE_TAG }}
