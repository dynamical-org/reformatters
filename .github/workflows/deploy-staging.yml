name: Deploy Staging

on:
  push:
    branches: [ 'stage/**' ]

# Per-branch concurrency so staging deploys don't block each other or main
concurrency:
  group: "deploy-staging-${{ github.ref_name }}"
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: "${{ secrets.DOCKER_REPOSITORY }}:${{ github.sha }}"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-24.04

    # Keep code-quality.yaml and these steps in sync
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Set up Python"
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --all-extras --dev --locked

      - name: Install this project
        run: "uv pip install -e ."

      - name: Run Ruff
        run: uv run ruff check --output-format=github

      - name: Check code format
        run: uv run ruff format --check

      - name: Run ty
        run: uv run ty check

      - name: Run Pytest
        run: uv run pytest -p no:sugar --verbose

  deploy:
    name: Deploy Staging
    needs: quality
    runs-on: ubuntu-24.04
    environment: prod

    # Keep deploy-operational-updates.yaml and these steps in sync
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          # Fetch main so deploy-staging can compare versions via git show
          fetch-depth: 0

      - name: Parse branch name
        id: parse
        run: |
          BRANCH="${{ github.ref_name }}"
          # Branch format: stage/{dataset_id}/v{version}
          # Strip "stage/" prefix, then split on "/v"
          WITHOUT_PREFIX="${BRANCH#stage/}"
          DATASET_ID="${WITHOUT_PREFIX%/v*}"
          VERSION="${WITHOUT_PREFIX##*/v}"

          if [[ "$DATASET_ID" == "$VERSION" || -z "$DATASET_ID" || -z "$VERSION" ]]; then
            echo "::error::Could not parse dataset_id and version from branch '${BRANCH}'. Expected format: stage/{dataset_id}/v{version}"
            exit 1
          fi

          echo "dataset_id=${DATASET_ID}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Parsed dataset_id=${DATASET_ID}, version=${VERSION}"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Set up Python"
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --all-extras --dev --locked

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
        with:
          version: 'latest'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Set up Depot CLI
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        id: login-ecr

      - uses: depot/build-push-action@98e78adca7817480b8185f474a400b451d74e287 # v1
        with:
          project: ${{ secrets.DEPOT_PROJECT }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_TAG }}
          context: .
          file: deploy/Dockerfile

      - name: Deploy staging
        run: >
          uv run main deploy-staging
          ${{ steps.parse.outputs.dataset_id }}
          ${{ steps.parse.outputs.version }}
          ${{ env.IMAGE_TAG }}
