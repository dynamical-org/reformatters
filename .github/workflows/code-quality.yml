name: Code Quality

permissions:
  contents: read

on:
  pull_request:
  # Also run on main so the operational deploy can depend on this via workflow_run.
  push:
    branches: [main]

jobs:
  quality:
    name: Code Quality (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    # Keep deploy-staging.yaml and these steps in sync
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Set up Python"
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        # Needed to be able to compile dependencies on ARM64
        env:
          DISABLE_NUMCODECS_SSE2: 1
          DISABLE_NUMCODECS_AVX2: 1
          CFLAGS: "-Wno-implicit-function-declaration" 
        run: uv sync --all-extras --dev --locked

      - name: Install this project
        run: "uv pip install -e ."

      - name: Run Ruff
        run: uv run ruff check --output-format=github

      - name: Check code format
        run: uv run ruff format --check

      - name: Run ty
        run: uv run ty check

      - name: Run Pytest
        run: uv run pytest -p no:sugar --verbose

      - name: Ensure SHA pinned actions
        uses: zgosalvez/github-actions-ensure-sha-pinned-actions@3db98c0363e2fa5df3e1c4c471777a7c10b24cc9 # v5
