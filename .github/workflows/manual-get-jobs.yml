name: 'Manual: Get Jobs'
'on':
  workflow_dispatch: {}
permissions:
  id-token: write
  contents: read
jobs:
  get-jobs:
    name: Get Jobs
    runs-on: ubuntu-24.04
    environment: prod
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        sparse-checkout: .
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Install kubectl
      uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b
      with:
        version: latest
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}
    - name: Get jobs (SEE LOGS)
      run: |
        #!/bin/bash
        set -euo pipefail

        # Get jobs and save output (capture both stdout and stderr for "No resources found" message)
        OUTPUT=$(kubectl get jobs --sort-by=.metadata.creationTimestamp 2>&1)

        # Print to logs (plaintext version of summary)
        echo "## Kubernetes Jobs"
        echo ""
        echo "$OUTPUT"
        echo ""
        echo "### Monitoring"
        echo ""
        echo "- Better Stack heartbeats: https://uptime.betterstack.com/team/552704/monitors"
        echo "- Better Stack logs: https://telemetry.betterstack.com/team/552704/tail"

        # Write to job summary
        echo "## Kubernetes Jobs" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Monitoring" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- [Better Stack heartbeats](https://uptime.betterstack.com/team/552704/monitors)" >> $GITHUB_STEP_SUMMARY
        echo "- [Better Stack logs](https://telemetry.betterstack.com/team/552704/tail)" >> $GITHUB_STEP_SUMMARY
